<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f8 0%, #f3e5f5 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4);
            backdrop-filter: blur(10px);
            border: 4px solid #ffffff;
            z-index: 1;
            max-width: 400px;
            animation: fadeIn 1.5s ease-out;
        }

        /* The Photo Frame */
        .photo-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #eee;
            animation: float 3s ease-in-out infinite;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #ff4081;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        p {
            font-size: 1.1rem;
            color: #6a1b9a;
            line-height: 1.5;
        }

        .heart {
            color: #ff4081;
            font-size: 1.5rem;
            margin-top: 15px;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <div class="card">
        <div class="photo-container">
            <img src="https://i.ibb.co/Zpt881PQ/IMG20260416140334.jpg" alt="Birthday Girl">
        </div>

        <h1>Happy Birthday!</h1>
        <p>To my beautiful niece,</p>
        <p>May your day be filled with magic, laughter, and all the cake you can eat!</p>
        
        <div class="heart">❤ ❤ ❤</div>
        
        <p style="font-size: 0.8rem; opacity: 0.8;">With love always,<br><b></b></p>
    </div>

    <script>
        const container = document.getElementById('confetti-container');
        const colors = ['#ffc1e3', '#b2ebf2', '#f8bbd0', '#e1bee7', '#fff9c4'];

        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 3) + 's';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.opacity = Math.random();
            container.appendChild(confetti);
        }
    </script>
</body>
</html>
